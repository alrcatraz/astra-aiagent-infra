# ══════════════════════════════════════════════════════════════
# Astral Agent Infrastructure — Component Registry
# ══════════════════════════════════════════════════════════════
#
# This is the core entry point of astra-aiagent-infra.
# One file to see the full picture:
# - All tools, frameworks, and tutorials built for Hermes Agent
# - Each component's standalone repository (clone / pip install)
# - Maturity status of each component
#
# Every component lives in its own repo with its own release cadence.

meta:
  project: astra-aiagent-infra
  maintainer: Nanaly
  description: >
    Hermes Agent ecosystem portal — a unified index of all skills,
    SRE frameworks, MCP services, and tutorials.
  license: MIT

components:

  # ── Tutorials ─────────────────────────────────────────────
  - type: tutorial
    name: hermes-agent-tutorial
    repo: alrcatraz/hermes-agent-tutorial
    description: Hermes Agent from scratch (3 volumes)
    lang: [zh-CN, en]
    status: active

  # ── Skills ────────────────────────────────────────────────
  - type: skill
    name: pre-action-research
    repo: alrcatraz/astra-skill-pre-action-research
    description: Mandatory research & index lookup before taking action
    status: active

  - type: skill
    name: change-safeguard
    repo: alrcatraz/astra-skill-change-safeguard
    description: Pre-change safeguarding checks & post-change side-effect scan
    status: active

  - type: skill
    name: deploy-register
    repo: alrcatraz/astra-skill-deploy-register
    description: Mandatory registration checklist after deploying a new service
    status: active

  - type: skill
    name: work-closure-check
    repo: alrcatraz/astra-skill-work-closure-check
    description: Mandatory closure checklist when wrapping up a task
    status: active

  # ── SRE Modules ───────────────────────────────────────────
  - type: sre
    name: astra-sre
    repo: alrcatraz/astra-sre
    description: Unified SRE coordination layer — device inspection, fault diagnosis, auto-repair
    status: active

  # ── MCP Services ──────────────────────────────────────────
  - type: mcp
    name: astra-knowledge-base
    repo: alrcatraz/astra-knowledge-base-mcp
    description: Knowledge base retrieval MCP service
    transport: stdio
    status: active
