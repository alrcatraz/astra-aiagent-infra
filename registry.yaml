# ══════════════════════════════════════════════════════════════
# Astral Agent Infrastructure — 组件注册表
# ══════════════════════════════════════════════════════════════
#
# 这是 astra-aiagent-infra 的核心入口。
# 读者只需看这一个文件，就能了解本项目全貌：
# - 所有为 Hermes Agent 构建的工具、框架、教程
# - 每个组件的独立仓库地址（可直接 clone / pip install）
# - 组件的成熟度状态
#
# 每个组件应有独立仓库，有自己的版本迭代节奏。
# 尚未提取的组件在 location 字段标记其当前路径。

meta:
  project: astra-aiagent-infra
  maintainer: Nanaly
  description: >
    Hermes Agent 生态门户 — 记录所有技能、运维框架、
    MCP 服务、教程的统一索引。
  license: MIT

components:

  # ── 教程 ────────────────────────────────────────────────
  - type: tutorial
    name: hermes-agent-tutorial
    repo: alrcatraz/hermes-agent-tutorial
    description: 从零开始的 Hermes Agent 教程（三卷）
    lang: [zh-CN, en]
    status: planned

  # ── 技能 ────────────────────────────────────────────────
  - type: skill
    name: pre-action-research
    repo: alrcatraz/astra-skill-pre-action-research
    description: 执行操作前强制调研与查索引
    status: active
    location: skills/pre-action-research/

  - type: skill
    name: change-safeguard
    repo: alrcatraz/astra-skill-change-safeguard
    description: 修改系统前强制执行的保全检查与事后扫描
    status: active
    location: skills/change-safeguard/

  - type: skill
    name: deploy-register
    repo: alrcatraz/astra-skill-deploy-register
    description: 部署新服务后强制执行登记清单
    status: active
    location: skills/deploy-register/

  - type: skill
    name: work-closure-check
    repo: alrcatraz/astra-skill-work-closure-check
    description: 任务收尾时强制执行闭环检查清单
    status: active
    location: skills/work-closure-check/

  # ── SRE 模块 ────────────────────────────────────────────
  - type: sre
    name: astra-sre
    repo: alrcatraz/astra-sre
    description: 统一 SRE 协调层 — 设备巡检、故障诊断、自动修复
    status: active
    location: astra-sre/

  # ── MCP 服务 ────────────────────────────────────────────
  - type: mcp
    name: astra-knowledge-base
    repo: alrcatraz/astra-knowledge-base-mcp
    description: 知识库检索 MCP 服务
    transport: stdio
    status: active

  - type: mcp
    name: astra-time
    repo: built-in
    description: 时间转换 MCP 服务（Hermes 内置）
    transport: stdio
    status: active

  - type: mcp
    name: astra-markitdown
    repo: built-in
    description: 文档转 Markdown MCP 服务（Hermes 内置）
    transport: stdio
    status: active
