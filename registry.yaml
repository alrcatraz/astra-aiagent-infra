# ══════════════════════════════════════════════════════════════
# Astral Agent Infrastructure — Component Registry
# ══════════════════════════════════════════════════════════════
#
# This is the core entry point of astra-aiagent-infra.
# One file to see the full picture:
# - All tools, frameworks, and tutorials built for Hermes Agent
# - Each component's standalone repository (clone / pip install)
# - Maturity status of each component
#
# Every component lives in its own repo with its own release cadence.

meta:
  project: astra-aiagent-infra
  maintainer: alrcatraz
  description: >
    Hermes Agent ecosystem portal — a unified index of all skills,
    SRE frameworks, MCP services, and tutorials.
  license: MIT

components:

  # ── Executive framework ─────────────────────────────────
  - type: skill
    name: execution-framework
    repo: alrcatraz/astra-skill-execution-framework
    version: 2.0.2
    description: >
      Task classification and routing (manual-only, keyword-based
      recommendation tool). No longer part of the agentic harness —
      work-principles plugin handles routing via phase gates and
      tool-triggered auto-loading.
    status: active
    depends_on:
      - repo: alrcatraz/astra-aiagent-infra
        resource: registry.yaml
        required: optional
        reason: Scanned by sync-routing.py to detect new skills for routing
      - repo: alrcatraz/astra-aiagent-infra
        resource: work-principles/skills/pre-action-research
        required: optional
        reason: Absorbed into work-principles — research & plan routing
      - repo: alrcatraz/astra-aiagent-infra
        resource: work-principles/skills/change-safeguard
        required: optional
        reason: Routed to when task type is system modification (absorbed from astra-skill-change-safeguard)
      - repo: alrcatraz/astra-aiagent-infra
        resource: work-principles/skills/deploy-register
        required: optional
        reason: Absorbed into work-principles — deploy routing
      - repo: alrcatraz/astra-aiagent-infra
        resource: work-principles/skills/work-closure-check
        required: optional
        reason: Absorbed into work-principles — closure routing
    lifecycle:
      closure:
        - id: ef-version-consistency
          check: Verify version consistency across registry + local repos
          command: "cd $ASTRA_EF_DIR && uv run scripts/sync-routing.py --verify-versions"
          severity: recommended
          trigger: registry.yaml or SKILL.md modified

  # ── Credential Management ────────────────────────────
  - type: skill
    name: credential-store-management
    repo: alrcatraz/astra-aiagent-infra
    local_path: skills/devops/credential-store-management/
    version: 1.0.0
    description: >
      Three-layer credential store management — GPG-encrypted YAML for device
      credentials, KeePassXC for service accounts, .env for bootstrap secrets.
      Exhaustive search protocol and credential lifecycle workflows.
    status: active
    depends_on:
      - repo: alrcatraz/astra-aiagent-infra
        resource: work-principles/skills/pre-action-research
        required: optional
        reason: Absorbed into work-principles — credential lookup during research

  # ── Tutorials ─────────────────────────────────────────────
  - type: tutorial
    name: hermes-agent-tutorial
    repo: alrcatraz/hermes-agent-tutorial
    version: 3.1.0
    description: Hermes Agent from scratch (3 volumes), v3.1
    lang: [zh-CN, en]
    status: active
    depends_on: []

  # ── Skills ────────────────────────────────────────────────
  - type: skill
    name: change-safeguard
    repo: alrcatraz/astra-aiagent-infra
    local_path: work-principles/skills/change-safeguard/
    version: 2.0.0
    description: Pre-change safeguarding checks & post-change side-effect scan (migrated into work-principles)
    status: active
    depends_on: []

  - type: skill
    name: work-principles
    repo: alrcatraz/astra-aiagent-infra
    local_path: work-principles/
    version: 1.0.0
    description: >
      Umbrella for work discipline — context anchoring, approval discipline,
      pre-action research, closure check, deploy registration. Replaces
      pre-action-research, work-closure-check, deploy-register as standalone skills.
    status: active
    depends_on:
      - repo: alrcatraz/astra-aiagent-infra
        resource: registry.yaml
        required: optional
        reason: Self-discovered via registry
    lifecycle:
      deploy:
        - id: wp-service-register
          check: 部署新服务后注册到服务清单 + 健康检查 → 详见 work-principles/skills/deploy-register
          severity: required
          trigger: new service, MCP, or CLI tool deployed
      closure:
        - id: wp-closure
          check: 收尾 checklist（凭据扫描 + skill 更新 + 决策记录 + 信息存储）→ 详见 work-principles/skills/work-closure-check
          severity: required
          trigger: task wrap-up

  - type: skill
    name: astra-hub
    repo: alrcatraz/astra-aiagent-infra
    local_path: skills/devops/astra-hub/
    version: 1.2.0
    description: "astar-* 生态地图索引：记忆/知识路由、项目索引、凭证安全指南、快速参考"
    status: active
    depends_on: []
    lifecycle:
      deploy:
        - id: hub-index-sync
          check: 验证 Hub 项目索引表包含所有 registry 中已注册的组件（不含已吸收的独立条目）
          command: "grep -c '|' ~/Projects/astra/astra-aiagent-infra/skills/devops/astra-hub/SKILL.md | head -1 || echo 'Manual check: compare Hub index vs registry.yaml components'"
          severity: required
          trigger: registry.yaml modified（新增/移除组件）

  # ── VCS Workflow ──────────────────────────────────────────
  - type: skill
    name: astra-vcs-assist
    repo: alrcatraz/astra-vcs-assist
    version: 1.0.0
    description: >
      Version control workflow orchestration — GPG key lifecycle, Git repo
      bootstrap, daily dev flow, release management, and cross-machine sync.
      Modular sub-skill tree (gpg-key, git-init, git-dev, git-release,
      git-sync) that auto-loads into Hermes via symlinks.
    status: active
    depends_on: []
    lifecycle:
      closure:
        - id: vcs-sub-skill-symlinks
          check: Verify all sub-skill symlinks in Hermes discovery path are reachable
          command: >
            for d in astra-vcs-assist-gpg-key astra-vcs-assist-git-init
            astra-vcs-assist-git-dev astra-vcs-assist-git-release
            astra-vcs-assist-git-sync; do
            test -L "$HOME/.hermes/skills/vcs/$d" -o -d "$HOME/.hermes/skills/vcs/$d"
            || echo "MISSING: $d"; done
          severity: required
          trigger: sub-skill added, removed, or repo path changed
        - id: vcs-routing-coverage
          check: Verify routing.yaml covers every sub-skill directory
          command: >
            cd "$HOME/.astra/repos/astra-vcs-assist" &&
            for d in git/skills/*/ gpg/*/; do
            skill=$(basename "$d");
            grep -q "$skill" routing.yaml || echo "UNCOVERED: $skill"; done
          severity: recommended
          trigger: routing.yaml or sub-skill SKILL.md modified
      deploy:
        - id: vcs-register-symlinks
          check: Register all sub-skill symlinks in Hermes discovery path
          command: >
            mkdir -p "$HOME/.hermes/skills/vcs" &&
            ln -sfn "$HOME/.astra/repos/astra-vcs-assist"
            "$HOME/.hermes/skills/vcs/astra-vcs-assist" &&
            for d in gpg/astra-vcs-assist-gpg-key
            git/skills/astra-vcs-assist-git-init
            git/skills/astra-vcs-assist-git-dev
            git/skills/astra-vcs-assist-git-release
            git/skills/astra-vcs-assist-git-sync; do
            ln -sfn "$HOME/.astra/repos/astra-vcs-assist/$d"
            "$HOME/.hermes/skills/vcs/$(basename $d)"; done
          severity: required
          trigger: new clone or first deploy of vcs-assist
        - id: vcs-sub-skill-exist
          check: Verify all sub-skill SKILL.md files exist
          command: >
            for f in SKILL.md
            gpg/astra-vcs-assist-gpg-key/SKILL.md
            git/skills/astra-vcs-assist-git-init/SKILL.md
            git/skills/astra-vcs-assist-git-dev/SKILL.md
            git/skills/astra-vcs-assist-git-release/SKILL.md
            git/skills/astra-vcs-assist-git-sync/SKILL.md; do
            test -f "$HOME/.astra/repos/astra-vcs-assist/$f" || echo "MISSING: $f"; done
          severity: required
          trigger: deploy or update of vcs-assist

  # ── SRE Modules ───────────────────────────────────────────
  - type: sre
    name: astra-sre
    repo: alrcatraz/astra-sre
    local_path: skills/devops/astra-sre/
    version: 1.0.1
    description: Unified SRE coordination layer — device inspection, fault diagnosis, auto-repair
    status: active
    depends_on:
      - repo: alrcatraz/astra-knowledge-base-mcp
        resource: PostgreSQL astra_kb database via ASTRA_KB_PG_DSN
        required: recommended
        reason: Incident data layer — health-scan.py, triage.py, and learn.py share the same PG DB
    lifecycle:
      closure:
        - id: sre-health-scan
          check: Run health scan to verify device coverage after SRE changes
          command: "cd $ASTRA_SRE_DIR && python3 scripts/health-scan.py --json"
          severity: required
          trigger: devices.yaml or health-scan.py modified
        - id: sre-incident-kb
          check: Update sre_incidents knowledge base with post-mortem after any repair
          action: "kb_add(kb='sre_incidents', content=..., tags=...)"
          severity: recommended
          trigger: any SRE repair or incident occurred
        - id: sre-config-sync
          check: Verify devices.yaml is in sync with infrastructure-device-inventory
          command: "diff <(python3 scripts/health-scan.py --json) <(cat config/devices.yaml)"
          severity: recommended
          trigger: devices.yaml modified
      deploy:
        - id: sre-device-register
          check: Register new device in SRE config/devices.yaml
          template: config/devices.yaml.example
          severity: required
          trigger: new device added to infrastructure

  # ── MCP Services ──────────────────────────────────────────
  - type: mcp
    name: astra-knowledge-base
    repo: alrcatraz/astra-knowledge-base-mcp
    version: 1.2.0
    description: Knowledge base retrieval MCP service (PostgreSQL + pgvector)
    transport: stdio
    status: active
    depends_on: []

  # ── Plugins ────────────────────────────────────────────────
  - type: plugin
    name: context-anchor
    repo: alrcatraz/astra-aiagent-infra
    local_path: work-principles/plugin/context-anchor/
    version: 1.0.0
    description: >-
      Hermes Plugin: cross-session context anchoring. Automatically maintains
      [AGENT CONTEXT] headers via pre_llm_call + post_tool_call hooks.
      State persistence, SSH auto-detection, thread session tracking.
    status: active
    depends_on:
      - repo: alrcatraz/astra-knowledge-base-mcp
        resource: markitdown-mcp MCP server
        required: optional
        reason: Shares the same MCP infrastructure

# ── Plugins ────────────────────────────────────────────────
  - type: plugin
    name: web-extract-markitdown
    repo: alrcatraz/astra-web-extract-markitdown
    version: 1.0.0
    description: >-
      Replace web_extract with a local markitdown-mcp backend. Converts URLs to
      markdown via ctx.dispatch_tool → mcp_markitdown_convert_to_markdown.
      Inherits GLM vision model for OCR on images and scanned PDFs.
    status: active
    depends_on:
      - repo: alrcatraz/astra-knowledge-base-mcp
        resource: markitdown-mcp MCP server
        required: required
        reason: Plugin dispatches to mcp_markitdown_convert_to_markdown


# ── Infrastructure ────────────────────────────────────────
  - type: infra
    name: astra-camofox-browser
    repo: alrcatraz/astra-camofox-browser
    version: 1.0.0
    description: >
      Stealth browser automation server (Camofox fork) with Podman deployment.
      Bypasses bot detection (Cloudflare, Xianyu, etc.) via Camoufox C++-level
      fingerprint spoofing. Patched for Linux Xvfb + Playwright compatibility.
    branch: astra
    transport: http (port 9377)
    status: active
    depends_on: []
